# Render Blueprint: https://render.com/docs/infrastructure-as-code
# Create: Dashboard → New → Blueprint → connect this repo (or paste render.yaml).
# MongoDB: use Atlas (or another host); set MONGO_URI in the service Environment.

services:
  - type: web
    name: it-company-web
    runtime: node
    plan: free
    buildCommand: npm install && npm install --prefix client && npm install --prefix server && npm run build --prefix client
    startCommand: npm run start --prefix server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
